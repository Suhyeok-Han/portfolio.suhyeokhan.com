<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>시침질 (Basting) — Web Maze — Visual Design — Suhyeok Han</title>
<meta name="description" content="시침질 — an interactive web maze. Visual Design by Suhyeok Han.">
<style>
/* ============================================================
   시침질 (Basting) — Figma "Wire Frame" prototype, ported as an
   image-based interactive maze. Real frame renders live in
   ./p1-assets/<id>.png ; all frame + connection data is in the
   FRAMES object below. No route is revealed to the visitor.
   ============================================================ */
:root{
  --bg:#0d0d0f; --stagebg:#111114;
  --rotMs:820ms; --scn-w:390; --scn-h:844;   /* logical portrait screen */
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
  background:var(--stagebg); overflow:hidden;
  font-family:-apple-system,"Helvetica Neue","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  color:#eee; -webkit-tap-highlight-color:transparent;
}

/* ---------- stage / device ---------- */
#stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
#scaler{transition:transform var(--rotMs) cubic-bezier(.6,0,.2,1);}

.device{
  position:relative; background:#0a0a0a; border-radius:54px; padding:15px;
  box-shadow:0 30px 70px rgba(0,0,0,.5), inset 0 0 0 2px #232323, 0 0 0 1px #000;
}
.device .notch{position:absolute; top:15px; left:50%; transform:translateX(-50%);
  width:128px; height:24px; background:#0a0a0a; border-radius:0 0 16px 16px; z-index:6;}
.device.landscape .notch{top:50%; left:15px; transform:translateY(-50%) rotate(90deg); transform-origin:center;}

.viewport{
  position:relative; width:var(--vw); height:var(--vh);
  background:#000; border-radius:38px; overflow:hidden;
}
.device.landscape .viewport{border-radius:30px;}

/* one-shot rotation animation (rests at transform:none so scroll stays normal) */
@keyframes spinFromPortrait{ from{transform:rotate(-90deg);} to{transform:rotate(0deg);} }
@keyframes spinFromLandscape{ from{transform:rotate(90deg);} to{transform:rotate(0deg);} }
.device.spin-l{animation:spinFromPortrait var(--rotMs) cubic-bezier(.6,0,.2,1);}
.device.spin-p{animation:spinFromLandscape var(--rotMs) cubic-bezier(.6,0,.2,1);}

/* ---------- screens ---------- */
.scn{position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; background:#000;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.scn::-webkit-scrollbar{display:none;}
.scn .frame{position:relative; width:100%;}      /* height set per image aspect */
.scn img{display:block; width:100%; height:auto; user-select:none; -webkit-user-drag:none;}
.hot{position:absolute; cursor:pointer; border-radius:6px; transition:background .15s, box-shadow .15s;}
.hot:hover{background:rgba(232,163,61,.10); box-shadow:0 0 0 1.5px rgba(232,163,61,.55) inset;}
body.hints .hot{box-shadow:0 0 0 1.5px rgba(232,163,61,.5) inset; background:rgba(232,163,61,.06);}

/* transition layers */
.scn.enter{opacity:0;}
.scn.run.fade{opacity:1; transition:opacity var(--tdur,420ms) ease;}
.scn.leave.fade{opacity:0; transition:opacity var(--tdur,420ms) ease;}
.scn.enter.sl{opacity:1;} .scn.enter.slL{transform:translateX(100%);} .scn.enter.slR{transform:translateX(-100%);}
.scn.enter.slT{transform:translateY(100%);} .scn.enter.slB{transform:translateY(-100%);}
.scn.run.sl{transform:translate(0,0); transition:transform var(--tdur,420ms) cubic-bezier(.4,0,.2,1);}
.scn.leave.slL{transform:translateX(-100%);} .scn.leave.slR{transform:translateX(100%);}
.scn.leave.slT{transform:translateY(-100%);} .scn.leave.slB{transform:translateY(100%);}
.scn.leave.sl{transition:transform var(--tdur,420ms) cubic-bezier(.4,0,.2,1);}

/* ---------- minimal controls ---------- */
#bar{position:fixed; top:14px; left:14px; z-index:40; display:flex; gap:8px;}
.cbtn{width:38px; height:38px; border-radius:11px; border:1px solid #2c2c30; background:rgba(20,20,22,.72);
  color:#ddd; font-size:15px; cursor:pointer; backdrop-filter:blur(6px); display:flex; align-items:center;
  justify-content:center;}
.cbtn:hover{border-color:#555; color:#fff;}
#panel{position:fixed; top:0; left:0; height:100%; width:240px; z-index:45; background:rgba(16,16,18,.96);
  border-right:1px solid #232327; padding:22px 18px; transform:translateX(-105%);
  transition:transform .3s cubic-bezier(.4,0,.2,1); backdrop-filter:blur(8px);}
#panel.open{transform:translateX(0);}
#panel h1{font-size:16px; margin:0 0 2px;}
#panel .sub{color:#888; font-size:11.5px; line-height:1.6; margin:0 0 18px;}
#panel .row{display:flex; gap:8px; margin-bottom:10px;}
#panel button{flex:1; font:inherit; font-size:12px; background:#1c1c20; border:1px solid #2c2c30; color:#ddd;
  padding:8px; border-radius:8px; cursor:pointer;}
#panel button:hover{border-color:#555; color:#fff;}
#panel label{display:flex; align-items:center; gap:8px; font-size:12px; color:#aaa; margin-top:12px; cursor:pointer;}
#panel .hint{font-size:11px; color:#666; line-height:1.6; border-top:1px solid #232327; padding-top:14px; margin-top:18px;}
#scrim{position:fixed; inset:0; z-index:44; background:rgba(0,0,0,.4); opacity:0; pointer-events:none;
  transition:opacity .3s;}
#scrim.on{opacity:1; pointer-events:auto;}

/* ---------- mobile: full-bleed screen only (no bezel) ---------- */
@media (max-width:760px), (pointer:coarse){
  #stage{padding:0;}
  #scaler{transform:none !important; width:100vw; height:100vh; height:100dvh;}
  .device{padding:0; border-radius:0; box-shadow:none; width:100vw; height:100vh; height:100dvh;}
  .device .notch{display:none;}
  .viewport{width:100vw !important; height:100vh !important; height:100dvh !important; border-radius:0 !important;}
  .device.spin-l, .device.spin-p{animation:none;}   /* user rotates real phone */
}
</style>

const FRAMES = DATA.frames, START = DATA.start;
const ASSET = 'p1-assets/';

const device   = document.getElementById('device');
const viewport = document.getElementById('viewport');
const scaler   = document.getElementById('scaler');

let current=null, orient='portrait', hist=[], busy=false;

/* ---- preloading ---- */
const cache = {};
function preload(id){
  if(!id || cache[id] || !FRAMES[id]) return;
  const im = new Image(); im.src = ASSET + FRAMES[id].img; cache[id] = im;
}
function preloadNeighbors(id){
  (FRAMES[id].spots||[]).forEach(s => preload(s.to));
}

/* ---- transition mapping ---- */
function trans(spot){
  let dur = spot && spot.dur ? Math.min(Math.max(spot.dur*1000,260),1000) : 420;
  let cls = 'fade';
  if(spot && (spot.tt==='PUSH'||spot.tt==='SLIDE_IN'||spot.tt==='SLIDE_OUT'||spot.tt==='MOVE_IN')){
    const d = spot.dir||'LEFT';
    cls = 'sl ' + (d==='RIGHT'?'slR':d==='TOP'?'slT':d==='BOTTOM'?'slB':'slL');
  }
  return {cls, dur};
}

/* ---- build one screen ---- */
function buildScreen(id){
  const f = FRAMES[id];
  const scn = document.createElement('div'); scn.className='scn'; scn.dataset.id=id;
  const frame = document.createElement('div'); frame.className='frame';
  const img = document.createElement('img');
  img.src = ASSET + f.img; img.alt=''; img.draggable=false;
  frame.appendChild(img);

  // sort hotspots: full/large first (under), small ones on top
  const spots = (f.spots||[]).slice().sort((a,b)=> (b.w*b.h)-(a.w*a.h));
  spots.forEach(s => {
    const h = document.createElement('div'); h.className='hot';
    h.style.left=(s.x*100)+'%'; h.style.top=(s.y*100)+'%';
    h.style.width=(s.w*100)+'%'; h.style.height=(s.h*100)+'%';
    if(s.full){ h.style.borderRadius='0'; }
    h.addEventListener('click', e => { e.stopPropagation(); go(s.to, s); });
    frame.appendChild(h);
  });
  scn.appendChild(frame);
  return scn;
}

/* ---- orientation / sizing ---- */
function applyOrient(o){
  orient = o;
  device.classList.toggle('landscape', o==='landscape');
  const W=getComputedStyle(document.documentElement).getPropertyValue('--scn-w').trim();
  const H=getComputedStyle(document.documentElement).getPropertyValue('--scn-h').trim();
  const w = o==='landscape'? H : W, h = o==='landscape'? W : H;
  document.documentElement.style.setProperty('--vw', w+'px');
  document.documentElement.style.setProperty('--vh', h+'px');
  fitScale();
}
function fitScale(){
  if(matchMedia('(max-width:760px),(pointer:coarse)').matches){ scaler.style.transform='none'; return; }
  const aw=innerWidth-70, ah=innerHeight-70;
  const dw=device.offsetWidth||380, dh=device.offsetHeight||880;
  const sc=Math.min(aw/dw, ah/dh, 1.55);
  scaler.style.transform='scale('+sc.toFixed(3)+')';
}

/* ---- navigation ---- */
function go(id, spot){ if(busy||!FRAMES[id]) return; if(current!==null) hist.push(current); navigate(id,spot,false); }

function navigate(id, spot, instant){
  const f=FRAMES[id];
  const oriChange = f.orient!==orient;
  const incoming = buildScreen(id);

  if(instant){
    viewport.innerHTML=''; applyOrient(f.orient); viewport.appendChild(incoming); finish(id); return;
  }
  busy=true;
  const {cls,dur}=trans(spot);
  const outgoing=viewport.querySelector('.scn');

  const doSwap=()=>{
    incoming.style.setProperty('--tdur',dur+'ms');
    incoming.classList.add('enter', ...cls.split(' '));
    viewport.appendChild(incoming);
    void incoming.offsetWidth;
    incoming.classList.remove('enter'); incoming.classList.add('run');
    if(outgoing){ outgoing.style.setProperty('--tdur',dur+'ms'); outgoing.classList.add('leave', ...cls.split(' ')); }
    setTimeout(()=>{ if(outgoing) outgoing.remove();
      incoming.classList.remove('run', ...cls.split(' ')); busy=false; finish(id); }, dur+40);
  };

  if(oriChange){
    applyOrient(f.orient);
    const spinCls = f.orient==='landscape' ? 'spin-l' : 'spin-p';
    device.classList.remove('spin-l','spin-p'); void device.offsetWidth;
    device.classList.add(spinCls);
    setTimeout(()=>device.classList.remove(spinCls), 860);
    setTimeout(doSwap, 300);
  } else { doSwap(); }
}

function finish(id){ current=id; preloadNeighbors(id); try{history.replaceState(null,'','#f='+id);}catch(e){} }

/* ---- controls ---- */
function openPanel(v){ document.getElementById('panel').classList.toggle('open',v);
  document.getElementById('scrim').classList.toggle('on',v); }
document.getElementById('menuBtn').onclick=()=>openPanel(!document.getElementById('panel').classList.contains('open'));
document.getElementById('scrim').onclick=()=>openPanel(false);
function goBack(){ if(busy||!hist.length) return; navigate(hist.pop(), null, false); }
document.getElementById('backBtn').onclick=goBack;
document.getElementById('pBack').onclick=goBack;
function goHome(){ if(busy) return; hist=[]; navigate(START,null,false); openPanel(false); }
document.getElementById('pHome').onclick=goHome;
document.getElementById('hintChk').onchange=e=>document.body.classList.toggle('hints',e.target.checked);
document.getElementById('pPortfolio').onclick=()=>location.href='../index.html';
addEventListener('resize', fitScale);
addEventListener('keydown', e=>{ if(e.key==='Backspace'||e.key==='ArrowLeft'){e.preventDefault();goBack();} });

/* ---- init (supports #f=ID deep-link) ---- */
(function(){
  let id=START; const m=location.hash.match(/f=([0-9:]+)/); if(m&&FRAMES[m[1]]) id=m[1];
  if(location.hash.includes('hints')) document.body.classList.add('hints');
  applyOrient(FRAMES[id].orient);
  navigate(id,null,true);
})();
</script>
