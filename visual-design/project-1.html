<style>
/* ============================================================
   시침질 (Basting) — image-based maze (real Figma renders).
   • From the rotation point the device + content rotate -90° (rigid).
   • Transitions mirror Figma type/dir/duration/easing.
   • Component cues live in a persistent layer (#fx): the baked-in cue is
     covered, only the blinking cue shows, it stays upright per screen
     orientation, and glides to its new spot when shared across frames.
   ============================================================ */
:root{ --bg:#0c0c0e; --rotMs:840ms; --pw:404; --ph:874; }
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{background:var(--bg); overflow:hidden; -webkit-tap-highlight-color:transparent;
  font-family:-apple-system,"Helvetica Neue","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif; color:#eee;}

#stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
#scaler{transition:transform var(--rotMs) cubic-bezier(.62,0,.2,1);}

.device{position:relative; width:calc(var(--pw)*1px + 30px); height:calc(var(--ph)*1px + 30px);
  background:#070707; border-radius:56px; padding:15px;
  box-shadow:0 34px 80px rgba(0,0,0,.55), inset 0 0 0 2px #222, 0 0 0 1px #000;
  transform:rotate(0deg); transition:transform var(--rotMs) cubic-bezier(.62,0,.2,1);}
.device.landscape{transform:rotate(-90deg);}
.device .notch{position:absolute; top:15px; left:50%; transform:translateX(-50%);
  width:130px; height:25px; background:#070707; border-radius:0 0 16px 16px; z-index:9;}

.viewport{position:relative; width:calc(var(--pw)*1px); height:calc(var(--ph)*1px);
  background:#000; border-radius:40px; overflow:hidden;}

/* screens */
.scn{position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; background:#000;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;}
.scn::-webkit-scrollbar{display:none;}
.frm{position:relative; width:100%;}
.frm > img.base{display:block; width:100%; height:auto; user-select:none; -webkit-user-drag:none;}
.cover{position:absolute; z-index:3; pointer-events:none;}     /* hides the baked-in cue */
.hot{position:absolute; cursor:pointer; border-radius:5px; z-index:5; transition:background .15s, box-shadow .15s;}
.hot:hover{background:rgba(232,163,61,.10); box-shadow:0 0 0 1.5px rgba(232,163,61,.55) inset;}
body.hints .hot{box-shadow:0 0 0 1.5px rgba(232,163,61,.5) inset; background:rgba(232,163,61,.06);}

/* persistent component-cue layer (above screens, upright, glides) */
#fx{position:absolute; inset:0; z-index:7; pointer-events:none;}
.cue{position:absolute; transform-origin:center center;
  transition:left var(--cmv,520ms) cubic-bezier(.4,0,.2,1), top var(--cmv,520ms) cubic-bezier(.4,0,.2,1),
             width var(--cmv,520ms) cubic-bezier(.4,0,.2,1), height var(--cmv,520ms) cubic-bezier(.4,0,.2,1),
             opacity .35s ease, transform var(--rotMs) cubic-bezier(.62,0,.2,1);}
#fx.land .cue{transform:rotate(90deg);}            /* counter-rotate -> upright when device is -90 */
.cue img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0;
  transition:opacity var(--cf,320ms) linear;}

/* transitions */
.scn.enter{opacity:0;}
.scn.run.fade{opacity:1; transition:opacity var(--tdur,500ms) var(--teas,ease);}
.scn.leave.fade{opacity:0; transition:opacity var(--tdur,500ms) var(--teas,ease);}
.scn.enter.slL{transform:translateX(100%);} .scn.enter.slR{transform:translateX(-100%);}
.scn.enter.slT{transform:translateY(100%);} .scn.enter.slB{transform:translateY(-100%);}
.scn.run.sl{transform:translate(0,0); transition:transform var(--tdur,500ms) var(--teas,cubic-bezier(.4,0,.2,1));}
.scn.leave.slL{transform:translateX(-100%);} .scn.leave.slR{transform:translateX(100%);}
.scn.leave.slT{transform:translateY(-100%);} .scn.leave.slB{transform:translateY(100%);}
.scn.leave.sl{transition:transform var(--tdur,500ms) var(--teas,cubic-bezier(.4,0,.2,1));}

/* minimal controls */
#bar{position:fixed; top:14px; left:14px; z-index:40; display:flex; gap:8px;}
.cbtn{width:38px; height:38px; border-radius:11px; border:1px solid #2c2c30; background:rgba(20,20,22,.72);
  color:#ddd; font-size:15px; cursor:pointer; backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center;}
.cbtn:hover{border-color:#666; color:#fff;}
#panel{position:fixed; top:0; left:0; height:100%; width:244px; z-index:45; background:rgba(15,15,17,.96);
  border-right:1px solid #222; padding:22px 18px; transform:translateX(-105%); transition:transform .3s cubic-bezier(.4,0,.2,1); backdrop-filter:blur(8px);}
#panel.open{transform:translateX(0);}
#panel h1{font-size:16px; margin:0 0 2px;} #panel .sub{color:#888; font-size:11.5px; line-height:1.6; margin:0 0 16px;}
#panel .row{display:flex; gap:8px; margin-bottom:10px;}
#panel button{flex:1; font:inherit; font-size:12px; background:#1b1b1f; border:1px solid #2c2c30; color:#ddd; padding:8px; border-radius:8px; cursor:pointer;}
#panel button:hover{border-color:#666; color:#fff;}
#panel label{display:flex; align-items:center; gap:8px; font-size:12px; color:#aaa; margin-top:12px; cursor:pointer;}
#panel .hint{font-size:11px; color:#666; line-height:1.6; border-top:1px solid #222; padding-top:14px; margin-top:18px;}
#scrim{position:fixed; inset:0; z-index:44; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .3s;}
#scrim.on{opacity:1; pointer-events:auto;}

@media (max-width:760px), (pointer:coarse){
  #stage{padding:0;}
  #scaler{transform:none !important; width:100vw; height:100dvh;}
  .device{padding:0; border-radius:0; box-shadow:none; width:100vw; height:100dvh; transform:none !important;}
  .device .notch{display:none;}
  .viewport{width:100vw !important; height:100dvh !important; border-radius:0 !important;}
  #fx.land .cue{transform:none;}   /* real phone rotates; keep cues as-is */
}
</style>

  const addCovers=()=>{ (f.comps||[]).forEach(c=>{
    const col=sampleBg(img,c,f.img+'@'+c.x+','+c.y); if(!col) return;
    const cv=document.createElement('div'); cv.className='cover'; const p=0.015;
    cv.style.left=((c.x-p)*100)+'%'; cv.style.top=((c.y-p)*100)+'%';
    cv.style.width=((c.w+2*p)*100)+'%'; cv.style.height=((c.h+2*p)*100)+'%'; cv.style.background=col;
    frm.appendChild(cv);
  }); };
  if(img.complete && img.naturalWidth) addCovers(); else img.addEventListener('load',addCovers,{once:true});
  (f.spots||[]).slice().sort((a,b)=>(b.w*b.h)-(a.w*a.h)).forEach(s=>{
    const h=document.createElement('div'); h.className='hot';
    h.style.left=(s.x*100)+'%'; h.style.top=(s.y*100)+'%'; h.style.width=(s.w*100)+'%'; h.style.height=(s.h*100)+'%';
    h.addEventListener('click',e=>{e.stopPropagation(); go(s.to,s);});
    frm.appendChild(h);
  });
  scn.appendChild(frm);
  return scn;
}

/* persistent cue layer: create / glide / remove blinking cues */
function cueKey(c){ return c.vars.slice().sort().join('|'); }
function updateCues(id, dur){
  const f=FRAMES[id]; const present={};
  const vpW=viewport.clientWidth||404, dispH=vpW*(f.h/f.w);
  (f.comps||[]).forEach(c=>{
    const key=cueKey(c); present[key]=1;
    const L=c.x*vpW, T=c.y*dispH, W=c.w*vpW, H=c.h*dispH;
    let cue=fx.querySelector('.cue[data-k="'+key+'"]');
    if(!cue){
      cue=document.createElement('div'); cue.className='cue'; cue.dataset.k=key;
      const eff=Math.max((c.iv||.9)*3,1.2); cue.dataset.iv=eff;
      cue.style.setProperty('--cf', Math.round(Math.min(eff*0.45,0.7)*1000)+'ms');
      c.vars.forEach((v,k)=>{ const im=new Image(); im.src=ASSET+v; im.style.opacity=k?0:1; cue.appendChild(im); });
      cue.style.cssText+=';left:'+L+'px;top:'+T+'px;width:'+W+'px;height:'+H+'px;opacity:0;';
      cue.style.setProperty('--cmv','0ms'); fx.appendChild(cue);
      requestAnimationFrame(()=>{ cue.style.setProperty('--cmv',dur+'ms'); cue.style.opacity='1'; });
      startCue(cue);
    } else {
      cue.style.setProperty('--cmv',dur+'ms');
      cue.style.left=L+'px'; cue.style.top=T+'px'; cue.style.width=W+'px'; cue.style.height=H+'px'; cue.style.opacity='1';
    }
  });
  [...fx.children].forEach(cue=>{ if(!present[cue.dataset.k]){ stopCue(cue); cue.style.opacity='0'; const x=cue; setTimeout(()=>x.remove(),380); } });
}
function startCue(cue){ const ls=[...cue.querySelectorAll('img')]; if(ls.length<2){ if(ls[0])ls[0].style.opacity=1; return; }
  let i=0; const iv=Math.max(parseFloat(cue.dataset.iv)||1.2,0.6)*1000;
  cue._t=setInterval(()=>{ ls[i].style.opacity=0; i=(i+1)%ls.length; ls[i].style.opacity=1; }, iv); }
function stopCue(cue){ clearInterval(cue._t); }

/* orientation (rigid rotation) + scaling */
function applyOrient(o){ orient=o; device.classList.toggle('landscape',o==='landscape'); fx.classList.toggle('land',o==='landscape'); fitScale(); }
function fitScale(){
  if(matchMedia('(max-width:760px),(pointer:coarse)').matches){ scaler.style.transform='none'; return; }
  const dw=device.offsetWidth||434, dh=device.offsetHeight||904;
  const fw=orient==='landscape'?dh:dw, fh=orient==='landscape'?dw:dh;
  const sc=Math.min((innerWidth-80)/fw,(innerHeight-80)/fh,1.6);
  scaler.style.transform='scale('+sc.toFixed(3)+')';
}

/* navigation */
function go(id,spot){ if(busy||!FRAMES[id])return; if(current!==null) hist.push(current); navigate(id,spot,false); }
function navigate(id,spot,instant){
  const f=FRAMES[id]; const oriChange=f.orient!==orient; const incoming=buildScreen(id);
  if(instant){ viewport.querySelectorAll('.scn').forEach(s=>s.remove()); applyOrient(f.orient);
    viewport.insertBefore(incoming, fx); updateCues(id,0); finish(id); return; }
  const desk=!matchMedia('(max-width:760px),(pointer:coarse)').matches;
  busy=true; const {cls,dur,eas}=trans(spot, f.orient==='landscape'&&desk); const outgoing=viewport.querySelector('.scn');
  const doSwap=()=>{
    incoming.style.setProperty('--tdur',dur+'ms'); incoming.style.setProperty('--teas',eas);
    incoming.classList.add('enter',...cls.split(' ')); viewport.insertBefore(incoming, fx);
    updateCues(id, Math.max(dur,360));
    void incoming.offsetWidth; incoming.classList.remove('enter'); incoming.classList.add('run');
    if(outgoing){ outgoing.style.setProperty('--tdur',dur+'ms'); outgoing.style.setProperty('--teas',eas); outgoing.classList.add('leave',...cls.split(' ')); }
    setTimeout(()=>{ if(outgoing) outgoing.remove();
      incoming.classList.remove('run',...cls.split(' ')); busy=false; finish(id); }, dur+50);
  };
  if(oriChange){ applyOrient(f.orient); setTimeout(doSwap, Math.round((parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--rotMs'))||840)*0.42)); }
  else doSwap();
}
function finish(id){ current=id; preloadNeighbors(id); try{history.replaceState(null,'','#f='+id);}catch(e){} }

/* controls */
function openPanel(v){ document.getElementById('panel').classList.toggle('open',v); document.getElementById('scrim').classList.toggle('on',v); }
document.getElementById('menuBtn').onclick=()=>openPanel(!document.getElementById('panel').classList.contains('open'));
document.getElementById('scrim').onclick=()=>openPanel(false);
function goBack(){ if(busy||!hist.length)return; navigate(hist.pop(),null,false); }
document.getElementById('backBtn').onclick=goBack; document.getElementById('pBack').onclick=goBack;
function goHome(){ if(busy)return; hist=[]; navigate(START,null,false); openPanel(false); }
document.getElementById('pHome').onclick=goHome;
document.getElementById('hintChk').onchange=e=>document.body.classList.toggle('hints',e.target.checked);
document.getElementById('pPortfolio').onclick=()=>location.href='../index.html';
addEventListener('resize',fitScale);
addEventListener('keydown',e=>{ if(e.key==='Backspace'||e.key==='ArrowLeft'){e.preventDefault();goBack();} });

(function(){ let id=START; const m=location.hash.match(/f=([0-9:]+)/); if(m&&FRAMES[m[1]])id=m[1];
  if(location.hash.includes('hints'))document.body.classList.add('hints');
  applyOrient(FRAMES[id].orient); navigate(id,null,true); })();
</script>
