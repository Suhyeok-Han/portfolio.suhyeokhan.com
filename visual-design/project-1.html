<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>시침질 (Basting) — Web Maze — Visual Design — Suhyeok Han</title>
<meta name="description" content="시침질 — an interactive web maze. Visual Design by Suhyeok Han.">
<style>
/* ============================================================
   시침질 (Basting) — LAYERED renderer. Each frame is composed from its
   Figma layers (transparent PNGs in p1-assets/L/). Navigating tweens the
   layers shared between two frames (matched by key) from their old to new
   position/size -> real SMART_ANIMATE (needle/thread glide). The tap is its
   own layer (blinks via opacity; no baked duplicate / cover / white box).
   ============================================================ */
:root{ --bg:#0c0c0e; --rotMs:840ms; --pw:404; --ph:874; }
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{background:var(--bg); overflow:hidden; -webkit-tap-highlight-color:transparent;
  font-family:-apple-system,"Helvetica Neue","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif; color:#eee;}

#stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
#scaler{transition:transform var(--rotMs) cubic-bezier(.62,0,.2,1);}
.device{position:relative; width:calc(var(--pw)*1px + 30px); height:calc(var(--ph)*1px + 30px);
  background:#070707; border-radius:56px; padding:15px;
  box-shadow:0 34px 80px rgba(0,0,0,.55), inset 0 0 0 2px #222, 0 0 0 1px #000;
  transform:rotate(0deg); transition:transform var(--rotMs) cubic-bezier(.62,0,.2,1);}
.device.landscape{transform:rotate(-90deg);}
.device .notch{position:absolute; top:15px; left:50%; transform:translateX(-50%);
  width:130px; height:25px; background:#070707; border-radius:0 0 16px 16px; z-index:9;}
.viewport{position:relative; width:calc(var(--pw)*1px); height:calc(var(--ph)*1px);
  background:#fff; border-radius:40px; overflow:hidden;}
#scn{position:absolute; inset:0; overflow:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; background:#fff;}
#scn::-webkit-scrollbar{display:none;}

/* the frame coordinate space; layers positioned in % of it */
#world{position:relative; width:100%; background:#fff;
  transition:width var(--rotMs) ease, height var(--rotMs) ease, background .4s ease;}
.ly{position:absolute; transform-origin:center center;
  transition:left var(--t,520ms) var(--e,cubic-bezier(.4,0,.2,1)),
             top var(--t,520ms) var(--e,cubic-bezier(.4,0,.2,1)),
             width var(--t,520ms) var(--e,cubic-bezier(.4,0,.2,1)),
             height var(--t,520ms) var(--e,cubic-bezier(.4,0,.2,1)),
             opacity var(--t,520ms) ease;}
.ly img{display:block; width:100%; height:100%; object-fit:fill; -webkit-user-drag:none; user-select:none;}
.ly.blink{animation:blnk var(--bd,2.4s) ease-in-out infinite;}
@keyframes blnk{0%,42%{opacity:1}52%,92%{opacity:0}100%{opacity:1}}
#world.land .ly.blink{transform:rotate(90deg);}     /* keep tap upright when device is -90 */

.hot{position:absolute; cursor:pointer; z-index:9000; border-radius:5px; transition:background .15s, box-shadow .15s;}
.hot:hover{background:rgba(232,163,61,.10); box-shadow:0 0 0 1.5px rgba(232,163,61,.55) inset;}
body.hints .hot{box-shadow:0 0 0 1.5px rgba(232,163,61,.5) inset; background:rgba(232,163,61,.06);}

/* controls */
#bar{position:fixed; top:14px; left:14px; z-index:40; display:flex; gap:8px;}
.cbtn{width:38px; height:38px; border-radius:11px; border:1px solid #2c2c30; background:rgba(20,20,22,.72);
  color:#ddd; font-size:15px; cursor:pointer; backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center;}
.cbtn:hover{border-color:#666; color:#fff;}
#panel{position:fixed; top:0; left:0; height:100%; width:244px; z-index:45; background:rgba(15,15,17,.96);
  border-right:1px solid #222; padding:22px 18px; transform:translateX(-105%); transition:transform .3s cubic-bezier(.4,0,.2,1); backdrop-filter:blur(8px);}
#panel.open{transform:translateX(0);}
#panel h1{font-size:16px; margin:0 0 2px;} #panel .sub{color:#888; font-size:11.5px; line-height:1.6; margin:0 0 16px;}
#panel .row{display:flex; gap:8px; margin-bottom:10px;}
#panel button{flex:1; font:inherit; font-size:12px; background:#1b1b1f; border:1px solid #2c2c30; color:#ddd; padding:8px; border-radius:8px; cursor:pointer;}
#panel button:hover{border-color:#666; color:#fff;}
#panel label{display:flex; align-items:center; gap:8px; font-size:12px; color:#aaa; margin-top:12px; cursor:pointer;}
#panel .hint{font-size:11px; color:#666; line-height:1.6; border-top:1px solid #222; padding-top:14px; margin-top:18px;}
#scrim{position:fixed; inset:0; z-index:44; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .3s;}
#scrim.on{opacity:1; pointer-events:auto;}

@media (max-width:760px), (pointer:coarse){
  #stage{padding:0;}
  #scaler{transform:none !important; width:100vw; height:100dvh;}
  .device{padding:0; border-radius:0; box-shadow:none; width:100vw; height:100dvh; transform:none !important;}
  .device .notch{display:none;}
  .viewport{width:100vw !important; height:100dvh !important; border-radius:0 !important;}
  #world.land .ly.blink{transform:none;}
}
</style>

까? 나에":{"node":"310:2725","file":"m-.png"},"c318:574":{"node":"318:583","file":"c318-574.png"},"m애초에 내가 생각하는 좋은 옷은 어떤 옷이었나?":{"node":"111:327","file":"m-.png"},"m내가 생각하는 정성의 범주는 어떻게 되는가?":{"node":"115:376","file":"m-.png"},"mGroup 1":{"node":"312:545","file":"mGroup-1.png"},"mGroup 3":{"node":"321:593","file":"mGroup-3.png"},"i2987634699a4f28b5eb278e705577677aac8f67d":{"node":"321:580","file":"i2987634699a4f28b5eb278e705577677aac8f67.png"},"m그러한 정성이 좋은 옷의 충분조건인가?":{"node":"115:405","file":"m-.png"},"m정성은 옷에 어떻게 작용하지?":{"node":"115:406","file":"m-.png"},"m디자인과 정성은 서로 상충되지 않는가? 그럼 나는 이걸 과연 디자인이라고 부를 수 있는 것인가?":{"node":"115:412","file":"m-.png"},"m정성이 많이 들어갈수록 꼭 좋은 옷이 되는 것인가?":{"node":"115:431","file":"m-.png"},"m디자인과 산업 공정에 이런 정성이 반영될 수 있나?":{"node":"115:435","file":"m-.png"},"m이런 내 옷을 산업에 맞게 규격화 시킬 수 있는 것인가?":{"node":"115:436","file":"m-.png"},"m좋은 원단은 여러가지 기준이 있겠지만 원단의 사용 목적, 용도에 맞는 기능을 가지고, 그 기능이 크게 손상되지 않는 원단이 좋은 원단일 것이다. 소방복을 만든다고 할 때에는 방염성이 우수하고 단열성이 좋은 원단이 좋은 원단일 것이고, 정장을 만들 때에는 다림질이 잘 되는, 그리고 표면이 매끈하고 촘촘한, 보풀은 잘 생기지 않는 원단이 좋은 원단일 것이다. 반대로 그런지 무드의 니트를 만들 때에는 원단이 손상되었을 때 그러한 손상이 두드러지는 원단이 좋은 원단일 것이다. 결국 디자인 목적을 얼마나 잘 반영할 수 있는가가 그 때 그 때의 좋은 원단을 결정하는 척도가 될 것이다. 그렇다면 좋은 디자인이란 무엇인가? 패션 디자인에서의 좋은 디자인은 무엇일까, 항상 해오는 고민이지만 디자이너의 의도가 잘 반영된 것이 좋은 디자인이라고 생각은 하지만 그렇다고해서 끝은 아니라고 생각한다. 어떠한 의도를 담을 것인가, 또 하나의 옷에 얼만큼의 의도를 담을 것인가 또한 고려의 대상이 되는 것이다. 결국 디자인은 단방향적 소통방식이 아닌가? 전달하고자 하는 의도는 결국 이해를 요하고, 공감을 요하기에 이를 우아하게 전달함으로서 공감을 유도해야하지 않을까. 그렇기에 전달하고자 하는 의도가 하나의 옷에 너무 많게 들어간다고 할 때, 기호의 포화는 결국 해석되지 못하고 하나의 감각적 인상으로 뭉퉁그려질 수 있음에 유의해야겠다. 그렇다고 해서 너무 희석되어 반영된 의도는 결국 이해의 필요성을 느끼지 못할 만큼, 마치 근거가 빈약한 주장과 같이 받아드려질 수도 있음을 생각하자. 그럼 도대체 적절한 수준의 의도의 반영인지는 어떻게 아는가? 결국 반복적인 시도로 이 적정선을 찾아내야 하지 않을까, 또 의도가 있다고 해서 그것이 디자인의 어떠한 요소요소로 드러날 수 있을 것인가? 의도의 성질, 문화적인 것인지, 복식적인 것인지, 조형적인 것인지에 따라 구현의 방향은 달라지지 않을까? 재차 고민해보고, 시도해보아야 할 문제이다. 그렇지만 결국 내가 만들고자 하는 것은 옷이다. 사람이 입는 옷. 절대 이것을 잊지 말고 디자인을 진행해야겠지. 옷이 다른 매체, 특히 디자인에 사용되는 매체들과 구분되는 점은 무엇인가? ":{"node":"115:450","file":"m-.png"},"m우선적으로 원단이 좋아야 좋은 옷이 된다. 디자인도 좋아야 하고, 만드는 공정 또한 수공예적인 요소가, 정성이 가미 되어야 좋은 옷이 완성된다.그런데 좋다는 기준은 너무 모호하지 않은가? 좋은 원단은 어떤게 좋은 원단이지? 어떤 디자인이 좋은 디자인이지? 정성은 꼭 필요한가? 정성이란 말은 너무 포괄적이지 않은가? 이를 구체화해야하지 않나?":{"node":"115:451","file":"m-.png"},"mGroup 5":{"node":"321:607","file":"mGroup-5.png"},"m정성의 정도는 어느 정도가 들어가야하는가?":{"node":"115:460","file":"m-.png"},"m내가 타협해야 하는 부분은 어떤 부분인가?":{"node":"115:461","file":"m-.png"},"m공장제와 수공예품 간의 타협점은 어떻게 마련해야하는가?":{"node":"115:465","file":"m-.png"},"c303:2432":{"node":"303:2698","file":"c303-2432.png"},"c303:2381":{"node":"303:2407","file":"c303-2381.png"},"ifa5505ee1a2fec68cd93cebd71255535dfa125e3":{"node":"123:199","file":"ifa5505ee1a2fec68cd93cebd71255535dfa125e.png"}}}, FRAMES=DATA.frames, START=DATA.start, ASSETS=DATA.assets, LDIR='p1-assets/L/';
const device=document.getElementById('device'), viewport=document.getElementById('viewport'),
      scaler=document.getElementById('scaler'), scn=document.getElementById('scn'), world=document.getElementById('world');
let current=null, orient='portrait', hist=[], busy=false;

function easeCss(e){ return {LINEAR:'linear',EASE_IN:'cubic-bezier(.42,0,1,1)',EASE_OUT:'cubic-bezier(0,0,.58,1)',
  EASE_IN_AND_OUT:'cubic-bezier(.42,0,.58,1)',GENTLE:'cubic-bezier(.42,0,.58,1)',
  BOUNCY:'cubic-bezier(.34,1.56,.64,1)',SLOW:'cubic-bezier(.33,0,.15,1)'}[e]||'cubic-bezier(.4,0,.2,1)'; }

/* asset preloading */
const acache={};
function preloadAsset(k){ if(!k||acache[k]||!ASSETS[k])return; const im=new Image(); im.src=LDIR+ASSETS[k].file; acache[k]=im; }
function preloadFrame(id){ (FRAMES[id]?FRAMES[id].layers:[]).forEach(L=>preloadAsset(L.a)); }

/* world sizing per frame */
function worldDims(f){ const vpW=viewport.clientWidth||404; const W=(f.w>500)?Math.round(vpW*1.8):vpW; return {W, H:Math.round(W*f.h/f.w)}; }

/* compose target frame: tween shared layers, fade in/out the rest */
function setFrame(id, dur, eas){
  const f=FRAMES[id];
  const {W,H}=worldDims(f);
  world.style.width=W+'px'; world.style.height=H+'px';
  scn.scrollTop=0; scn.scrollLeft=0;
  const present={};
  f.layers.forEach((L,i)=>{
    const key=L.a; present[key]=1;
    let ly=world.querySelector('.ly[data-k="'+cssEsc(key)+'"]');
    const isNew=!ly;
    if(isNew){
      ly=document.createElement('div'); ly.className='ly'; ly.dataset.k=key;
      const im=document.createElement('img'); im.src=LDIR+(ASSETS[key]?ASSETS[key].file:''); im.alt=''; ly.appendChild(im);
      ly.style.left=(L.x*100)+'%'; ly.style.top=(L.y*100)+'%'; ly.style.width=(L.w*100)+'%'; ly.style.height=(L.h*100)+'%';
      ly.style.opacity='0'; world.appendChild(ly);
    }
    ly.style.setProperty('--t', dur+'ms'); ly.style.setProperty('--e', eas);
    ly.style.zIndex=i+1;
    // blink (tap etc.)
    if(L.blink){ const bd=Math.max((L.iv||.9)*3,1.2)*2; ly.classList.add('blink'); ly.style.setProperty('--bd', bd.toFixed(2)+'s'); }
    else ly.classList.remove('blink');
    requestAnimationFrame(()=>{
      ly.style.left=(L.x*100)+'%'; ly.style.top=(L.y*100)+'%';
      ly.style.width=(L.w*100)+'%'; ly.style.height=(L.h*100)+'%';
      ly.style.opacity=L.blink?'1':String(L.op);
    });
  });
  // remove layers not in target
  [...world.querySelectorAll('.ly')].forEach(ly=>{
    if(!present[ly.dataset.k]){ ly.style.setProperty('--t',dur+'ms'); ly.style.opacity='0';
      const x=ly; setTimeout(()=>x.remove(), dur+60); }
  });
  // hotspots (rebuilt each frame; not tweened)
  [...world.querySelectorAll('.hot')].forEach(h=>h.remove());
  (f.spots||[]).slice().sort((a,b)=>(b.w*b.h)-(a.w*a.h)).forEach(s=>{
    const h=document.createElement('div'); h.className='hot';
    h.style.left=(s.x*100)+'%'; h.style.top=(s.y*100)+'%'; h.style.width=(s.w*100)+'%'; h.style.height=(s.h*100)+'%';
    h.addEventListener('click',e=>{e.stopPropagation(); go(s.to,s);});
    world.appendChild(h);
  });
}
function cssEsc(s){ return (window.CSS&&CSS.escape)?CSS.escape(s):s.replace(/["\\]/g,'\\$&'); }

function applyOrient(o){ orient=o; device.classList.toggle('landscape',o==='landscape'); world.classList.toggle('land',o==='landscape'); fitScale(); }
function fitScale(){
  if(matchMedia('(max-width:760px),(pointer:coarse)').matches){ scaler.style.transform='none'; return; }
  const dw=device.offsetWidth||434, dh=device.offsetHeight||904;
  const fw=orient==='landscape'?dh:dw, fh=orient==='landscape'?dw:dh;
  scaler.style.transform='scale('+Math.min((innerWidth-80)/fw,(innerHeight-80)/fh,1.6).toFixed(3)+')';
}

function go(id,spot){ if(busy||!FRAMES[id])return; if(current!==null) hist.push(current); navigate(id,spot); }
function navigate(id,spot){
  const f=FRAMES[id];
  let dur=spot&&spot.dur?Math.min(Math.max(spot.dur*1000,260),1300):560;
  const eas=easeCss(spot&&spot.eas);
  const oriChange=f.orient!==orient;
  busy=true;
  const run=()=>{ setFrame(id,dur,eas); current=id; preloadFrame(id);
    try{history.replaceState(null,'','#f='+id);}catch(e){} setTimeout(()=>busy=false,dur+80); };
  if(oriChange){ applyOrient(f.orient); setTimeout(run, Math.round((parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--rotMs'))||840)*0.4)); }
  else run();
}

/* controls */
function openPanel(v){ document.getElementById('panel').classList.toggle('open',v); document.getElementById('scrim').classList.toggle('on',v); }
document.getElementById('menuBtn').onclick=()=>openPanel(!document.getElementById('panel').classList.contains('open'));
document.getElementById('scrim').onclick=()=>openPanel(false);
function goBack(){ if(busy||!hist.length)return; const p=hist.pop(); navigate(p,null); }
document.getElementById('backBtn').onclick=goBack; document.getElementById('pBack').onclick=goBack;
function goHome(){ if(busy)return; hist=[]; navigate(START,null); openPanel(false); }
document.getElementById('pHome').onclick=goHome;
document.getElementById('hintChk').onchange=e=>document.body.classList.toggle('hints',e.target.checked);
document.getElementById('pPortfolio').onclick=()=>location.href='../index.html';
addEventListener('resize',fitScale);
addEventListener('keydown',e=>{ if(e.key==='Backspace'||e.key==='ArrowLeft'){e.preventDefault();goBack();} });

(function(){ let id=START; const m=location.hash.match(/f=([0-9:]+)/); if(m&&FRAMES[m[1]])id=m[1];
  if(location.hash.includes('hints'))document.body.classList.add('hints');
  applyOrient(FRAMES[id].orient); setFrame(id,0,'ease'); current=id; preloadFrame(id); })();
</script>
