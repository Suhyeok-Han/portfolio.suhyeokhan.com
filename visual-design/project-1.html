<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>시침질 (Basting) — Web Maze — Visual Design — Suhyeok Han</title>
<style>
/* ============================================================
   시침질 (Basting) — Figma "Wire Frame" page ported to a single
   self-contained HTML maze prototype.
   All frame + connection data lives in the FRAMES object (see <script>).
   ============================================================ */
:root{
  --ink:#1c1c1c; --muted:#8a8a8a; --line:#cfcfcf; --line2:#e6e6e6;
  --accent:#e8a33d; --accent2:#d8643a; --paper:#ffffff; --bg:#f4f2ee;
  --screenW:300px; --screenH:650px;          /* portrait inner screen */
  --rotMs:900ms;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg);
  font-family:-apple-system,"Helvetica Neue","Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif;
  color:var(--ink); display:flex; min-height:100vh;
}

/* ---------- left: maze map / HUD ---------- */
#hud{
  width:280px; flex:0 0 280px; padding:22px 20px; border-right:1px solid var(--line2);
  background:#faf9f7; overflow:auto; font-size:13px;
}
#hud h1{font-size:17px; margin:0 0 2px;}
#hud .sub{color:var(--muted); margin:0 0 16px; font-size:12px; line-height:1.5;}
#hud .now{font-size:12px; color:var(--muted); margin-bottom:4px;}
#hud .nowname{font-size:15px; font-weight:600; margin-bottom:14px;}
#hud .ori{display:inline-block; font-size:11px; padding:1px 7px; border:1px solid var(--line);
  border-radius:10px; color:var(--muted); margin-left:6px; vertical-align:middle;}
.btnrow{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
.ctl{font:inherit; font-size:12px; border:1px solid var(--line); background:#fff; color:var(--ink);
  padding:6px 11px; border-radius:8px; cursor:pointer;}
.ctl:hover{border-color:var(--ink);}
#hud .legend{font-size:11px; color:var(--muted); line-height:1.7; border-top:1px solid var(--line2);
  padding-top:14px; margin-top:6px;}
#trail{font-size:11px; color:var(--muted); line-height:1.6; word-break:keep-all;}
#trail b{color:var(--ink); font-weight:600;}

/* ---------- center: device stage ---------- */
#stage{flex:1; display:flex; align-items:center; justify-content:center; padding:30px; overflow:hidden;}
#scaler{transition:transform var(--rotMs) cubic-bezier(.7,0,.2,1);}

.device{
  position:relative; width:calc(var(--screenW) + 26px); height:calc(var(--screenH) + 26px);
  background:#111; border-radius:46px; padding:13px;
  box-shadow:0 26px 60px rgba(0,0,0,.28), inset 0 0 0 2px #2a2a2a;
  transition:transform var(--rotMs) cubic-bezier(.7,0,.2,1);
  transform:rotate(0deg);
}
.device.landscape{transform:rotate(90deg);}
.device .notch{
  position:absolute; top:13px; left:50%; transform:translateX(-50%);
  width:120px; height:22px; background:#111; border-radius:0 0 14px 14px; z-index:5;
}
.viewport{
  position:relative; width:var(--screenW); height:var(--screenH);
  background:var(--paper); border-radius:34px; overflow:hidden;
}
/* counter-rotating canvas keeps content upright (real-phone auto-rotate behaviour) */
.canvas{
  position:absolute; top:50%; left:50%;
  width:var(--screenW); height:var(--screenH);
  transform:translate(-50%,-50%) rotate(0deg);
  transition:transform var(--rotMs) cubic-bezier(.7,0,.2,1);
}
.device.landscape .canvas{
  width:var(--screenH); height:var(--screenW);
  transform:translate(-50%,-50%) rotate(-90deg);
}

/* ---------- a single screen inside the canvas ---------- */
.screen{position:absolute; inset:0; background:var(--paper); overflow:hidden;}
.screen .statusbar{position:absolute; top:0; left:0; right:0; height:26px; display:flex;
  align-items:center; justify-content:space-between; padding:0 16px; font-size:10px; color:#aaa; z-index:3;}
.ph{ /* wireframe image placeholder */
  position:absolute; border:1px dashed var(--line); border-radius:10px; background:
   repeating-linear-gradient(45deg,#fafafa,#fafafa 7px,#f1f1f1 7px,#f1f1f1 14px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  color:var(--muted);
}
.ph .ico{font-size:30px; filter:grayscale(.2);}
.ph .lab{font-size:10px; letter-spacing:.02em;}
.cap{position:absolute; transform:translate(-50%,-50%); text-align:center; width:84%;
  line-height:1.5; word-break:keep-all; white-space:pre-line; color:var(--ink);}

/* tap-to-continue full hotspot */
.taplayer{position:absolute; inset:0; cursor:pointer; z-index:4;}
.taphint{position:absolute; transform:translate(-50%,-50%); z-index:5; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--accent2);
  font-size:12px;}
.taphint .dot{width:54px; height:54px; border-radius:50%; border:2px solid var(--accent);
  display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--accent2);
  animation:pulse 1.4s ease-out infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(232,163,61,.5);}100%{box-shadow:0 0 0 16px rgba(232,163,61,0);}}

/* rotate cue (frame 6) */
.rotcue{position:absolute; left:50%; top:74%; transform:translate(-50%,-50%); z-index:6;
  display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:none;}
.rotcue .ring{width:74px; height:74px; border-radius:50%; border:2px dashed var(--accent2);
  display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--accent2);
  animation:spin 3.2s linear infinite;}
.rotcue .ring span{animation:spin 3.2s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.rotcue .msg{font-size:11px; color:var(--muted);}

/* branch buttons (visible maze choices) */
.branches{position:absolute; left:0; right:0; bottom:14px; display:flex; flex-wrap:wrap; gap:6px;
  justify-content:center; padding:0 12px; z-index:7;}
.branch{font:inherit; font-size:11px; border:1px solid var(--ink); background:#fff; color:var(--ink);
  padding:6px 10px; border-radius:16px; cursor:pointer; max-width:90%; word-break:keep-all;}
.branch:hover{background:var(--ink); color:#fff;}
.branch .arr{color:var(--accent2); margin-right:3px;}
.branch:hover .arr{color:#fff;}

/* ---------- transitions between screens ---------- */
.screen.enter{opacity:0;}
.screen.enter.fade{opacity:0;}
.screen.run.fade{opacity:1; transition:opacity var(--tdur,400ms) ease;}
.screen.leave.fade{opacity:0; transition:opacity var(--tdur,400ms) ease;}

.screen.enter.slideL{transform:translateX(100%);}
.screen.enter.slideR{transform:translateX(-100%);}
.screen.enter.slideB{transform:translateY(100%);}
.screen.run.slideL,.screen.run.slideR,.screen.run.slideB{transform:translate(0,0);
  transition:transform var(--tdur,400ms) cubic-bezier(.4,0,.2,1);}
.screen.leave.slideL{transform:translateX(-100%); transition:transform var(--tdur,400ms) cubic-bezier(.4,0,.2,1);}
.screen.leave.slideR{transform:translateX(100%); transition:transform var(--tdur,400ms) cubic-bezier(.4,0,.2,1);}
.screen.leave.slideB{transform:translateY(-100%); transition:transform var(--tdur,400ms) cubic-bezier(.4,0,.2,1);}

/* portfolio integration */
.pfnav{display:flex; gap:8px; margin-bottom:16px;}
.pfnav a{font-size:11px; color:var(--muted); text-decoration:none; border:1px solid var(--line2);
  padding:3px 9px; border-radius:7px;}
.pfnav a:hover{color:var(--ink); border-color:var(--ink);}
.pfback{position:fixed; top:12px; left:12px; z-index:60; display:none; font-size:12px; color:var(--ink);
  background:#fff; border:1px solid var(--line); border-radius:9px; padding:5px 11px; text-decoration:none;
  box-shadow:0 2px 8px rgba(0,0,0,.08);}
@media (max-width:760px){ #hud{display:none;} .pfback{display:inline-block;} }
</style>
</head>

    <h1>시침질 <span style="font-weight:400;color:#999">/ web maze</span></h1>
    <p class="sub">Figma "Wire Frame" 프로토타입을 그대로 이식한 인터랙티브 미로.<br>화면을 탭하면 다음으로, 분기 버튼으로 갈래길을 택합니다.</p>
    <div class="now">현재 화면</div>
    <div class="nowname"><span id="nowname">—</span><span class="ori" id="oritag">portrait</span></div>
    <div class="btnrow">
      <button class="ctl" id="backBtn">← 뒤로</button>
      <button class="ctl" id="homeBtn">처음으로</button>
    </div>

    <div class="legend">

      <b style="color:#e8a33d">●</b> 점멸 = 화면 아무 곳이나 탭<br>
      <b style="color:#1c1c1c">⬭</b> 알약 버튼 = 미로 분기 선택
    </div>
  </aside>

  <main id="stage">

      <div class="device" id="device">
        <div class="notch"></div>
        <div class="viewport">
          <div class="canvas" id="canvas"></div>
        </div>
      </div>
    </div>
  </main>

const FRAMES = DATA.frames;
const START  = DATA.start;

/* ---------------- engine ---------------- */
const device = document.getElementById('device');
const canvas = document.getElementById('canvas');
const scaler = document.getElementById('scaler');
let current = null;
let orient  = 'portrait';
let hist    = [];
let busy    = false;

function transitionFor(spot){
  // map Figma transition -> css class + duration(ms)
  let dur = spot && spot.dur ? Math.min(Math.max(spot.dur*1000, 250), 1200) : 400;
  let cls = 'fade';
  if(spot){
    if(spot.tt === 'PUSH' || spot.tt === 'SLIDE_IN' || spot.tt === 'SLIDE_OUT' || spot.tt === 'MOVE_IN'){
      const d = spot.dir || 'LEFT';
      cls = d === 'RIGHT' ? 'slideR' : d === 'BOTTOM' || d === 'TOP' ? 'slideB' : 'slideL';
    } else { cls = 'fade'; } // SMART_ANIMATE / DISSOLVE -> fade
  }
  return {cls, dur};
}

function buildScreen(id){
  const f = FRAMES[id];
  const s = document.createElement('div');
  s.className = 'screen';
  s.dataset.id = id;

  // status bar (wireframe chrome)
  const sb = document.createElement('div');
  sb.className = 'statusbar';
  sb.innerHTML = '<span>9:41</span><span>' + (f.orient==='landscape'?'▭':'▯') + '  ●●●</span>';
  s.appendChild(sb);

  // image placeholder (content hint)
  const land = (f.orient === 'landscape');
  const ph = document.createElement('div');
  ph.className = 'ph';
  if(land){ ph.style.cssText += 'left:6%;top:18%;width:46%;height:54%;'; }
  else    { ph.style.cssText += 'left:22%;top:24%;width:56%;height:42%;'; }
  ph.innerHTML = '<div class="ico">'+f.icon+'</div><div class="lab">'+f.disp+'</div>';
  s.appendChild(ph);

  // caption text(s)
  const meaningful = f.texts.filter(t => t.s !== 'tap!');
  meaningful.forEach(t => {
    const c = document.createElement('div');
    c.className = 'cap';
    c.textContent = t.s;
    let cx, cy, fs;
    if(land){ cx = 0.74; cy = (meaningful.length>1? 0.30 : 0.46); fs = Math.min(t.fs||15, 16); c.style.width='44%'; }
    else    { cx = (t.cx==null?0.5:t.cx); cy = (t.cy==null?0.16:t.cy); fs = Math.min(t.fs||15,18); }
    c.style.left = (cx*100)+'%'; c.style.top = (cy*100)+'%';
    c.style.fontSize = Math.max(fs*0.92, 11)+'px';
    s.appendChild(c);
  });

  // split spots: primary (full / tap-anywhere) vs branches
  const full = f.spots.filter(sp => sp.full || f.spots.length===1);
  const branch = f.spots.filter(sp => !(sp.full || f.spots.length===1));
  const primary = full[0] || (f.spots.length===1 ? f.spots[0] : null);

  if(primary){
    const tl = document.createElement('div');
    tl.className = 'taplayer';
    tl.addEventListener('click', () => go(primary.to, primary));
    s.appendChild(tl);

    if(f.rotcue){
      const rc = document.createElement('div');
      rc.className = 'rotcue';
      rc.innerHTML = '<div class="ring"><span>↻ tap</span></div><div class="msg">기기를 가로로 돌립니다</div>';
      s.appendChild(rc);
    } else {
      const hint = document.createElement('div');
      hint.className = 'taphint';
      let hx = (primary.cx!=null && !primary.full)? primary.cx : 0.5;
      let hy = (primary.cy!=null && !primary.full)? primary.cy : (land?0.80:0.82);
      hint.style.left = (hx*100)+'%'; hint.style.top = (hy*100)+'%';
      hint.innerHTML = '<div class="dot">tap</div>';
      s.appendChild(hint);
    }
  }

  if(branch.length){
    const wrap = document.createElement('div');
    wrap.className = 'branches';
    branch.forEach(sp => {
      const b = document.createElement('button');
      b.className = 'branch';
      b.innerHTML = '<span class="arr">→</span>' + sp.label;
      b.addEventListener('click', (e)=>{ e.stopPropagation(); go(sp.to, sp); });
      wrap.appendChild(b);
    });
    s.appendChild(wrap);
  }
  return s;
}

function setOrientation(newOri){
  if(newOri === orient) return;
  orient = newOri;
  device.classList.toggle('landscape', orient === 'landscape');
  fitScale();
}

function fitScale(){
  // scale device down if landscape (wide) overflows the stage
  const stage = document.getElementById('stage');
  const availW = stage.clientWidth - 60;
  const availH = stage.clientHeight - 60;
  const devW = device.offsetWidth, devH = device.offsetHeight;
  const w = orient==='landscape'? devH : devW;   // rotated footprint
  const h = orient==='landscape'? devW : devH;
  const sc = Math.min(1, availW/w, availH/h);
  scaler.style.transform = 'scale(' + sc.toFixed(3) + ')';
}

function go(id, spot){
  if(busy || !FRAMES[id]) return;
  if(current !== null) hist.push(current);
  navigate(id, spot, false);
}

function navigate(id, spot, instant){
  const f = FRAMES[id];
  const incoming = buildScreen(id);
  const {cls, dur} = transitionFor(spot);
  const oriChange = (f.orient !== orient);

  const outgoing = canvas.querySelector('.screen');

  if(instant){
    canvas.innerHTML = '';
    canvas.appendChild(incoming);
    setOrientation(f.orient);
    finish(id); return;
  }

  busy = true;
  // if orientation changes, rotate device first, then swap screens
  const startSwap = () => {
    incoming.style.setProperty('--tdur', dur+'ms');
    incoming.classList.add('enter', cls);
    canvas.appendChild(incoming);
    void incoming.offsetWidth;                  // reflow
    incoming.classList.remove('enter');
    incoming.classList.add('run');
    if(outgoing){
      outgoing.style.setProperty('--tdur', dur+'ms');
      outgoing.classList.add('leave', cls);
    }
    setTimeout(() => {
      if(outgoing) outgoing.remove();
      incoming.classList.remove('run', cls);
      busy = false;
      finish(id);
    }, dur + 30);
  };

  if(oriChange){
    setOrientation(f.orient);                   // triggers --rotMs rotation
    setTimeout(startSwap, 480);                 // let the rotation read before content swap
  } else {
    startSwap();
  }
}

function finish(id){
  current = id;
  const f = FRAMES[id];
  document.getElementById('nowname').textContent = f.disp;
  document.getElementById('oritag').textContent = f.orient;
  renderTrail();
  try{ history.replaceState(null,'', '#f=' + id); }catch(e){}
}

function renderTrail(){
  const t = document.getElementById('trail');
  const path = hist.slice(-6).map(h => FRAMES[h].disp);
  t.innerHTML = '<b>경로</b><br>' + (path.length? path.join(' → ') + ' → ' : '') +
                '<b>' + (current?FRAMES[current].disp:'') + '</b>';
}

document.getElementById('backBtn').addEventListener('click', () => {
  if(busy || !hist.length) return;
  const prev = hist.pop();
  navigate(prev, null, false);
});
document.getElementById('homeBtn').addEventListener('click', () => {
  if(busy) return; hist = []; navigate(START, null, false);
});
window.addEventListener('resize', fitScale);

// init (support #f=ID deep-link for testing)
(function init(){
  let startId = START;
  const m = location.hash.match(/f=([0-9:]+)/);
  if(m && FRAMES[m[1]]) startId = m[1];
  // set orientation instantly to the start frame's orientation
  orient = FRAMES[startId].orient;
  device.classList.toggle('landscape', orient==='landscape');
  navigate(startId, null, true);
  fitScale();
})();
</script>
