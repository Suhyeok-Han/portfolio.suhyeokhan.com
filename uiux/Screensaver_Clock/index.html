<title>Clock: The Door Opens and Light Seeps In — SUHYEOKHAN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 100%; height: 100%; background: #111; }
  body {
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    background: #111; overflow: hidden;
    font-family: 'Courier New', monospace;
  }
  #canvas-wrapper {
    aspect-ratio: 9 / 16;
    flex: 1 1 auto; min-height: 0;
    position: relative; overflow: hidden;
  }
  #canvas {
    position: absolute; top: 0; left: 0;
    width: 1080px; height: 1920px;
    transform-origin: top left;
  }
  .layer {
    position: absolute; top: 0; left: 0;
    width: 1080px; height: 1920px;
    pointer-events: none;
  }
  /* 레이어 순서 (배경 = floor/glow/struct 는 모든 오브젝트 뒤):
     1. floor-canvas — 바닥 텍스처 × 빛마스크 (빛=floor 보임, 그림자=검정)
     2. glow-canvas  — 빛 경계 번짐 (screen)
     3. struct-canvas— 상단 그림자 바 + 벽(이미지) + 문(원근 워프)+두께
     4. man-canvas   — 나무 마네킹 (multiply: 빛 위에서만 또렷이 보임)
     5. sweep-canvas — 초침 공 바닥 그림자 (multiply)
     6. ball-canvas  — 초침 = 굴러가는 공
  */
  #floor-canvas { z-index: 1; }
  #sweep-canvas { z-index: 2; mix-blend-mode: multiply; }  /* 초침 공 바닥 그림자 — 문보다 뒤 */
  #glow-canvas  { z-index: 3; mix-blend-mode: screen; }
  #struct-canvas{ z-index: 4; }                            /* 문 + 문 두께 (공 그림자 앞) */
  #man-canvas   { z-index: 5; mix-blend-mode: multiply; }
  #ball-canvas  { z-index: 7; }                            /* 초침 = 굴러가는 공 */
</style>
</head>
<body>

<div id="canvas-wrapper">
  <div id="canvas" style="transform: scale(0.39537);">
    <canvas id="floor-canvas" class="layer" width="1080" height="1920"></canvas>
    <canvas id="glow-canvas" class="layer" width="1080" height="1920"></canvas>
    <canvas id="struct-canvas" class="layer" width="1080" height="1920"></canvas>
    <canvas id="man-canvas" class="layer" width="1080" height="1920"></canvas>
    <canvas id="sweep-canvas" class="layer" width="1080" height="1920"></canvas>
    <canvas id="ball-canvas" class="layer" width="1080" height="1920"></canvas>
  </div>
</div>

<script>
const W = 1080, H = 1920;
['floor-canvas','glow-canvas','struct-canvas','man-canvas','sweep-canvas','ball-canvas'].forEach(id => {
  const c = document.getElementById(id);
  c.width = W; c.height = H;
});
const floorCtx  = document.getElementById('floor-canvas').getContext('2d');
const glowCtx   = document.getElementById('glow-canvas').getContext('2d');
const structCtx = document.getElementById('struct-canvas').getContext('2d');
const manCtx    = document.getElementById('man-canvas').getContext('2d');
const sweepCtx  = document.getElementById('sweep-canvas').getContext('2d');
const ballCtx   = document.getElementById('ball-canvas').getContext('2d');
// 빛마스크용 오프스크린 (floor multiply 에 사용)
const lmCanvas = document.createElement('canvas'); lmCanvas.width = W; lmCanvas.height = H;
const lmCtx = lmCanvas.getContext('2d');
// 마네킹 그림자(실루엣)용 오프스크린
const silCanvas = document.createElement('canvas');
const silCtx = silCanvas.getContext('2d');
// 초침 바닥 그림자용 오프스크린 (기울임 + 빛영역 마스크)
const sfCanvas = document.createElement('canvas'); sfCanvas.width = W; sfCanvas.height = H;
const sfCtx = sfCanvas.getContext('2d');

// ── scale ──────────────────────────────────────────────────────
function scaleCanvas() {
  const w = document.getElementById('canvas-wrapper').clientWidth;
  document.getElementById('canvas').style.transform = `scale(${w / W})`;
}
window.addEventListener('resize', scaleCanvas);
window.addEventListener('load',   scaleCanvas);

// ── 배경 이미지 (벽/문/바닥) ──────────────────────────────────
const BG_DIR = 'Background Source/';
const floorImg = new Image(), wallImg = new Image(), doorImg = new Image(), yarnImg = new Image();
// door.png 의 실제 문 객체 bbox [left,top,right,bottom] (원근 워프 src 로 사용)
const DOOR_BBOX = [236, 182, 670, 1241];
function loadBackgrounds(redraw) {
  let n = 4;
  [[floorImg,'floor.jpg'], [wallImg,'wall.jpg'], [doorImg,'door.png'], [yarnImg,'yarn.png']].forEach(([im,f]) => {
    im.onload = im.onerror = () => { if (--n <= 0) redraw(); };
    im.src = encodeURI(BG_DIR + f);
  });
}
// cover-crop: 이미지를 (dx,dy,dw,dh) 영역에 비율 유지하며 가득 채워 그림
function drawCover(ctx, img, dx, dy, dw, dh) {
  if (!img.complete || !img.naturalWidth) return;
  const ir = img.naturalWidth / img.naturalHeight, dr = dw / dh;
  let sw, sh, sx, sy;
  if (ir > dr) { sh = img.naturalHeight; sw = sh * dr; sx = (img.naturalWidth - sw) / 2; sy = 0; }
  else         { sw = img.naturalWidth;  sh = sw / dr; sx = 0; sy = (img.naturalHeight - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}
// 삼각형 텍스처 매핑 (src 삼각형 → dst 삼각형, affine)
function drawTexTri(ctx, img, s0,s1,s2, d0,d1,d2) {
  ctx.save();
  ctx.beginPath(); ctx.moveTo(d0[0],d0[1]); ctx.lineTo(d1[0],d1[1]); ctx.lineTo(d2[0],d2[1]); ctx.closePath();
  ctx.clip();
  const x0=s0[0],y0=s0[1], x1=s1[0],y1=s1[1], x2=s2[0],y2=s2[1];
  const u0=d0[0],v0=d0[1], u1=d1[0],v1=d1[1], u2=d2[0],v2=d2[1];
  const den = x0*(y1-y2) - x1*(y0-y2) + x2*(y0-y1);
  if (Math.abs(den) < 1e-6) { ctx.restore(); return; }
  const a=(u0*(y1-y2)-u1*(y0-y2)+u2*(y0-y1))/den;
  const b=(v0*(y1-y2)-v1*(y0-y2)+v2*(y0-y1))/den;
  const c=(x0*(u1-u2)-x1*(u0-u2)+x2*(u0-u1))/den;
  const d=(x0*(v1-v2)-x1*(v0-v2)+x2*(v0-v1))/den;
  const e=(x0*(y1*u2-y2*u1)-x1*(y0*u2-y2*u0)+x2*(y0*u1-y1*u0))/den;
  const f=(x0*(y1*v2-y2*v1)-x1*(y0*v2-y2*v0)+x2*(y0*v1-y1*v0))/den;
  ctx.setTransform(a,b,c,d,e,f);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}
// 원근 워프: 이미지 src 사각형을 dst 사각형[TL,TR,BR,BL]에 매핑 (N×N 분할)
function warpImage(ctx, img, sx,sy,sw,sh, quad, N) {
  const [TL,TR,BR,BL] = quad;
  const dpt = (u,v) => {
    const tx=TL[0]+(TR[0]-TL[0])*u, ty=TL[1]+(TR[1]-TL[1])*u;
    const bx=BL[0]+(BR[0]-BL[0])*u, by=BL[1]+(BR[1]-BL[1])*u;
    return [tx+(bx-tx)*v, ty+(by-ty)*v];
  };
  for (let i=0;i<N;i++) for (let j=0;j<N;j++) {
    const u0=i/N,u1=(i+1)/N, v0=j/N,v1=(j+1)/N;
    const s00=[sx+u0*sw,sy+v0*sh], s10=[sx+u1*sw,sy+v0*sh],
          s11=[sx+u1*sw,sy+v1*sh], s01=[sx+u0*sw,sy+v1*sh];
    const d00=dpt(u0,v0), d10=dpt(u1,v0), d11=dpt(u1,v1), d01=dpt(u0,v1);
    drawTexTri(ctx,img, s00,s10,s11, d00,d10,d11);
    drawTexTri(ctx,img, s00,s11,s01, d00,d11,d01);
  }
}

// ── 유틸 ──────────────────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function lerpPt(p1,p2,t){ return [lerp(p1[0],p2[0],t), lerp(p1[1],p2[1],t)]; }
function easeInOut(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }
// 진행도 — 선형(시간당 일정한 너비로 열리도록). 0..1
function prog(min){ return Math.max(0, Math.min(1, min/719)); }

function applyPath(ctx, poly) {
  ctx.beginPath();
  poly.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.closePath();
}

// ── 사각형 키포인트 ────────────────────────────────────────────
const SHAPE_KP = [
  { minutes:0,   TL:[340,0],  BL:[340,400],  TR:[1080,0], BR:[1080,400] },
  { minutes:719, TL:[940,0],  BL:[940,1020], TR:[1080,0], BR:[1080,750] },
];
function getShape(min) {
  if (min <= 0)   return {...SHAPE_KP[0]};
  if (min >= 719) return {...SHAPE_KP[1]};
  const e = prog(min);
  const f = SHAPE_KP[0], t = SHAPE_KP[1];
  return {
    TL: lerpPt(f.TL, t.TL, e), BL: lerpPt(f.BL, t.BL, e),
    TR: lerpPt(f.TR, t.TR, e), BR: lerpPt(f.BR, t.BR, e),
  };
}

// ── 이동하는 점 P 계산 ─────────────────────────────────────────
// 경로: (0,800) → (0,1920) → (745,1920)
// t=0 → P=(0,800),  t=1 → P=(745,1920)
function getP(t) {
  const seg1 = 1120, seg2 = 745, total = seg1 + seg2;
  const d = t * total;
  if (d <= seg1) return { pt:[0, 800+d], pastCorner:false };
  return { pt:[d-seg1, 1920], pastCorner:true };
}

// ── 문 두께 ───────────────────────────────────────────────────
// 문이 열린 정도(왼쪽 변 x: 340→940)에 비례한 옆면 두께(px).
const DOOR_MAX_THICK = 70;     // 다 열렸을 때 옆면 폭
function doorThick(shape) {
  const open = Math.max(0, Math.min(1, (shape.TL[0]-340) / (940-340)));
  return open * DOOR_MAX_THICK;
}

// ── 두 빛 폴리곤 ──────────────────────────────────────────────
// A = (340, 400) 고정
// B = (0, 800)   고정
// TL, BL = 사각형(문)의 좌측 상단/하단 — 단, 두께만큼 왼쪽으로 민 "옆면 앞날"을
//          실제 빛을 막는 모서리로 사용한다(두께가 그림자에 반영되도록).
// C = (340, BL.y) — 좌측 엣지 하단 경계 (x=340에서 BL 높이)

function getLightPolygons(min, shape) {
  if (shape.TL[0] <= 340) return null;

  const t = prog(min);
  const thick = doorThick(shape);
  const A  = [340, 400];
  const B  = [0, 800];
  const TL = [shape.TL[0]-thick, shape.TL[1]];  // 두께 앞날 (tx-thick, 0)
  const BL = [shape.BL[0]-thick, shape.BL[1]];  // 두께 앞날 (tx-thick, by)
  const C  = [340, BL[1]]; // x=340에서 BL 높이

  const { pt: P, pastCorner } = getP(t);

  // ── 오른쪽 빛: A → B → [corner] → P → C
  const rightPoly = [A, B];
  if (pastCorner) rightPoly.push([0, 1920]);
  rightPoly.push(P);
  rightPoly.push(C);

  // ── 왼쪽 빛: A → (340,0) → TL → BL → P → [corner] → B
  const leftPoly = [A, [340, 0], TL, BL];
  if (pastCorner) leftPoly.push([0, 1920]);
  leftPoly.push(P);
  leftPoly.push(B);

  // ── 모서리 통과 후, BL · (0,1920) · P 가 이루는 삼각형을 따로 채운다.
  //    (leftPoly 가 P→B 로 되돌아오며 자기교차해 비던 영역을 메움)
  const cornerTri = pastCorner ? [BL, [0, 1920], P] : null;

  return { rightPoly, leftPoly, cornerTri, P, pastCorner };
}

// ── 바닥(floor) ───────────────────────────────────────────────
// 빛 드는 영역엔 floor 텍스처가 보이고(multiply 로 약간 어둑), 그림자는 검정.
const FLOOR_LIT = '#dcdcdc';   // 빛 영역 multiply 계수(밝을수록 floor 선명)
function drawFloor(polys) {
  floorCtx.clearRect(0,0,W,H);
  floorCtx.fillStyle = '#000000';      // 기본 = 그림자(검정)
  floorCtx.fillRect(0,0,W,H);
  if (!polys || !floorImg.complete || !floorImg.naturalWidth) return;

  // 빛마스크: 검정 바탕 + 빛 폴리곤은 회색
  lmCtx.clearRect(0,0,W,H);
  lmCtx.fillStyle = '#000000'; lmCtx.fillRect(0,0,W,H);
  lmCtx.fillStyle = FLOOR_LIT;
  applyPath(lmCtx, polys.rightPoly); lmCtx.fill();
  applyPath(lmCtx, polys.leftPoly);  lmCtx.fill();
  if (polys.cornerTri) { applyPath(lmCtx, polys.cornerTri); lmCtx.fill(); }

  // floor 이미지(cover) × 빛마스크 → 빛=floor 보임, 그림자=검정
  floorCtx.save();
  drawCover(floorCtx, floorImg, 0,0,W,H);
  floorCtx.globalCompositeOperation = 'multiply';
  floorCtx.drawImage(lmCanvas, 0, 0);
  floorCtx.restore();
}

// ── Glow: 배경에 번지는 회색 그라디언트 ───────────────────────
// 각 폴리곤 경계에서 바깥으로 250px blur로 번지는 효과
// canvas filter blur 사용 — 폴리곤을 그리고 blur 적용
function drawGlow(polygons) {
  glowCtx.clearRect(0,0,W,H);
  if (!polygons) return;

  const { rightPoly, leftPoly, cornerTri } = polygons;

  // 1단계: 넓게 번지는 부드러운 glow
  glowCtx.save();
  glowCtx.filter = 'blur(120px)';
  glowCtx.fillStyle = 'rgba(188,188,188, 0.45)';
  applyPath(glowCtx, rightPoly); glowCtx.fill();
  applyPath(glowCtx, leftPoly);  glowCtx.fill();
  if (cornerTri) { applyPath(glowCtx, cornerTri); glowCtx.fill(); }
  glowCtx.filter = 'none';
  glowCtx.restore();

  // 2단계: 경계선 바로 바깥 강한 glow
  glowCtx.save();
  glowCtx.filter = 'blur(40px)';
  glowCtx.fillStyle = 'rgba(188,188,188, 0.3)';
  applyPath(glowCtx, rightPoly); glowCtx.fill();
  applyPath(glowCtx, leftPoly);  glowCtx.fill();
  if (cornerTri) { applyPath(glowCtx, cornerTri); glowCtx.fill(); }
  glowCtx.filter = 'none';
  glowCtx.restore();
}

// ── 구조물 (상단 바 + 벽 + 문 두께 + 문) ──────────────────────
const TOP_OPENING = '#bdbdbd';   // 상단 사각형 = 빛 들어오는 영역과 유사한 밝은 회색
const WALL_BRIGHT = 0.35;        // 벽 명도
function drawDoorThickness(shape) {
  // 왼쪽(여는) 변에 어두운 옆면 — 열릴수록 폭↑ (doorThick 와 동일 기준)
  const thick = doorThick(shape);
  if (thick < 1) return;
  const TL = shape.TL, BL = shape.BL;
  const quad = [[TL[0]-thick, TL[1]], TL, BL, [BL[0]-thick, BL[1]]];
  structCtx.save();
  applyPath(structCtx, quad);
  const g = structCtx.createLinearGradient(TL[0]-thick, 0, TL[0], 0);
  g.addColorStop(0, '#000000'); g.addColorStop(1, '#454545');  // 옆면 음영
  structCtx.fillStyle = g; structCtx.fill();
  structCtx.restore();
}
// 문 — door.png(손잡이는 이미지에서 이미 제거됨)를 사다리꼴에 원근 워프.
function drawDoor(shape) {
  const quad = [shape.TL, shape.TR, shape.BR, shape.BL];
  if (doorImg.complete && doorImg.naturalWidth) {
    const [l,t,r,b] = DOOR_BBOX;
    warpImage(structCtx, doorImg, l, t, r-l, b-t, quad, 12);
  } else {
    structCtx.save(); applyPath(structCtx, quad);
    structCtx.fillStyle = '#111'; structCtx.fill(); structCtx.restore();
  }
}
function drawStruct(shape) {
  structCtx.clearRect(0,0,W,H);
  // 1) 상단 사각형 = 빛 들어오는 영역과 유사한 밝은 회색 (예전 흰 바 대체)
  structCtx.fillStyle = TOP_OPENING;
  structCtx.fillRect(0, 0, W, 400);
  // 2) 벽(이미지, 340×400 cover-crop) — 명도 20%로 낮춰서
  structCtx.save();
  structCtx.beginPath(); structCtx.rect(0,0,340,400); structCtx.clip();
  if (wallImg.complete && wallImg.naturalWidth) {
    structCtx.filter = `brightness(${WALL_BRIGHT})`;
    drawCover(structCtx, wallImg, 0,0,340,400);
    structCtx.filter = 'none';
  } else { structCtx.fillStyle = '#231d16'; structCtx.fillRect(0,0,340,400); }
  structCtx.restore();
  // 3) 문 두께(옆면) → 4) 문(원근 워프)
  drawDoorThickness(shape);
  drawDoor(shape);
}

// ── 초침 = 굴러가는 공(실타래 이미지) + 바닥 그림자 (30초 주기, 우→좌) ──
const SEC_PERIOD = 30000;       // 30초당 한 바퀴
const SWEEP_BAR_H = 400;        // 상단 사각형 높이
const BALL_R = 80;              // 공 반지름(px)
const BALL_Y = SWEEP_BAR_H - BALL_R;   // 공 중심 y (바닥 가장자리에 닿게)
const BALL_CENTER_DARK = 0.55;  // 가운데로 갈수록 어두운 그라디언트 진하기
const BALL_SHADOW_DARK = 1.0;   // 바닥 그림자 진하기 (접점) — 기존 0.6 의 ~2배(100%↑)
const BALL_SHADOW_STRETCH = 1.7;// 그림자 길이 배율
const BALL_SHADOW_SIZE = 1.3;   // 그림자 크기 (30%↑)
const YARN_C = [743, 703], YARN_OBJ_R = 626;   // yarn.png 의 원형 객체 중심·반지름
function secCx(){ const p=(Date.now()%SEC_PERIOD)/SEC_PERIOD; return (W+BALL_R) - p*(W+BALL_R*2); }

// 공: 상단 opening(벽·문 제외)에서 굴러가며, 가운데로 갈수록 어두운 그라디언트.
function drawBall(min){
  ballCtx.clearRect(0,0,W,H);
  if (!yarnImg.complete || !yarnImg.naturalWidth) return;
  const cx = secCx();
  const roll = -(W + BALL_R - cx) / BALL_R;        // 이동거리/반지름 = 구르는 회전
  const s = BALL_R / YARN_OBJ_R;                    // 객체 반지름 → BALL_R
  ballCtx.save();
  ballCtx.beginPath(); ballCtx.rect(0,0,W,SWEEP_BAR_H); ballCtx.clip();   // 상단 사각형 영역
  ballCtx.translate(cx, BALL_Y); ballCtx.rotate(roll);
  // 이미지(alpha = 원형 누끼) — 객체 중심을 원점에 두고 그림
  ballCtx.drawImage(yarnImg, -YARN_C[0]*s, -YARN_C[1]*s, 1456*s, 1456*s);
  // 가운데로 갈수록 어둡게 — 공 픽셀 위에만 (source-atop)
  ballCtx.globalCompositeOperation = 'source-atop';
  const g = ballCtx.createRadialGradient(0,0,0, 0,0,BALL_R);
  g.addColorStop(0, `rgba(0,0,0,${BALL_CENTER_DARK})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ballCtx.fillStyle = g; ballCtx.fillRect(-BALL_R, -BALL_R, BALL_R*2, BALL_R*2);
  ballCtx.globalCompositeOperation = 'source-over';
  ballCtx.restore();
  // 벽 + 문(+두께) 영역에서는 공이 가려짐 → 문 두께가 공보다 앞에
  ballCtx.save();
  ballCtx.globalCompositeOperation = 'destination-out';
  ballCtx.fillStyle = '#000';
  ballCtx.fillRect(0, 0, 340, SWEEP_BAR_H);                       // 벽
  const sh = getShape(min), th = doorThick(sh);
  applyPath(ballCtx, [[sh.TL[0]-th, sh.TL[1]], sh.TR, sh.BR, [sh.BL[0]-th, sh.BL[1]]]);
  ballCtx.fill();                                                 // 문 + 두께 앞날까지
  ballCtx.restore();
}

// 공의 바닥 그림자: 마네킹 그림자와 동일 방식 — 검정 타원을 문 반대 방향으로 눕히고
//   접점=진함→끝=옅음 그라디언트. multiply 라 빛 영역에서만 보이고, 공과 함께 굴러감.
function drawBallShadow(min){
  sweepCtx.clearRect(0,0,W,H);
  const cx = secCx();
  const contact = [cx, SWEEP_BAR_H + 4];                         // 바닥 접점
  const ang = Math.atan2(contact[1]-MAN_LIGHT[1], contact[0]-MAN_LIGHT[0]);  // 문 반대 방향
  const len = BALL_R * 2 * BALL_SHADOW_STRETCH * BALL_SHADOW_SIZE;
  const wid = BALL_R * 2 * 0.9 * BALL_SHADOW_SIZE;
  sweepCtx.save();
  sweepCtx.translate(contact[0], contact[1]);
  sweepCtx.rotate(ang + Math.PI/2);                              // 위(-y)축 = ang 방향
  const g = sweepCtx.createLinearGradient(0, 0, 0, -len);
  g.addColorStop(0, `rgba(0,0,0,${BALL_SHADOW_DARK})`);          // 접점 = 진함
  g.addColorStop(1, 'rgba(0,0,0,0)');                            // 끝 = 옅음
  sweepCtx.fillStyle = g;
  sweepCtx.beginPath(); sweepCtx.ellipse(0, -len/2, wid/2, len/2, 0, 0, Math.PI*2); sweepCtx.fill();
  sweepCtx.restore();
}
function drawSeconds(min){ drawBallShadow(min); drawBall(min); }

// ── 나무 마네킹 (정각 표식) ───────────────────────────────────
// 각 마네킹은 자기 정각(M12=0시, M1=1시 … M11=11시)에 "비추기 시작"하도록,
//   그 시각의 빛 오른쪽 경계선(BL→P) 위에 객체 top-left 를 둔다 → onset = 정각 h.
//   경계선 위 어디에 두어도 onset 은 같으므로, 그 자유도로 서로 겹치지 않게
//   (그리디: 겹침 최소 + 화면 밖 방지) 펼친다. (원호 제약은 사용하지 않음)
// 배경 제거 PNG 라 이미지(896×1344)와 내부 객체 크기가 달라 bbox 기준으로 잡음.
// man-canvas 는 mix-blend-mode:multiply — 빛 위에서만 또렷이 보이고
//   검은(빛 없는) 곳에선 ×0 으로 사라진다.
const MAN_SCALE = 0.32;        // 기준 스케일
const MAN_SHRINK = 10;         // 내부 객체 높이 추가 축소(px)
const MAN_SIZE_PCT = 0.5;      // 현재 크기의 50%에서 시작(슬라이스에 맞춰 더 줄어들 수 있음)
const MAN_SAT   = 0.10;        // 채도 10%
const MAN_IMGDIR = 'wooden manequins/';
const IMG_W = 896, IMG_H = 1344;
// 각 이미지의 실제 객체(불투명) bbox: [left, top, right, bottom]
const MAN_BBOX = {
  M1:[263,183,564,1329], M2:[196,259,686,1291], M3:[320,220,576,1272],
  M4:[115,246,774,1292], M5:[253,237,597,1314], M6:[267,199,655,1305],
  M7:[75,199,770,1344],  M8:[266,226,591,1311], M9:[176,168,541,1315],
  M10:[293,200,687,1285],M11:[272,212,575,1278],M12:[257,202,576,1293]
};
// 각 마네킹의 실제 "발" 위치 [x,y] (이미지 좌표, 하단 불투명 픽셀 중심) — 그림자 정렬용
const MAN_FEET = {
  M1:[415.7,1327], M2:[425.3,1288], M3:[449.7,1270], M4:[427.7,1291],
  M5:[418.9,1312], M6:[527.6,1302], M7:[458.9,1343], M8:[435.4,1309],
  M9:[477.1,1312], M10:[433.2,1284], M11:[431.6,1276], M12:[427.5,1291]
};
const MAN_ORDER = ['M1','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12'];
const manImgs = {};

// 시각 m 의 빛 오른쪽 경계 변 [BL(두께 반영), end] — 모서리 통과 후 end=(0,1920)
function manBoundary(m){
  const sh = getShape(m), Pp = getP(prog(m)), thick = doorThick(sh);
  const BL = [sh.BL[0]-thick, sh.BL[1]];
  const end = Pp.pastCorner ? [0, 1920] : Pp.pt;
  return [BL, end];
}
// ── 가상 원호 위 배치 (처음 콘셉트로 복귀) ─────────────────────
// 원호 = B(0,800) 지나고 중심 (1080,0) 인 원. n번 마네킹은 "n시에 빛이 그 호에
//   막 닿는 점(onset)" 에 선다. 서로 겹치지 않게 인접 간격만큼 "가장 큰 사이즈"로.
const ARC_O = [1080, 0], ARC_R = Math.hypot(1080, 800);
const ARC_thB = Math.atan2(800 - ARC_O[1], 0 - ARC_O[0]);   // B 의 각도
const ARC_th90 = Math.PI/2;
function arcPt(th){ return [ARC_O[0] + ARC_R*Math.cos(th), ARC_O[1] + ARC_R*Math.sin(th)]; }
function ptInPoly(pt, poly){
  let x=pt[0], y=pt[1], n=poly.length, inside=false, j=n-1;
  for (let i=0;i<n;i++){ const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if (((yi>y)!=(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside; j=i; }
  return inside;
}
function arcOnset(th){              // 원호상 점이 처음 빛에 드는 시각(분)
  const q = arcPt(th);
  for (let m=0;m<=719;m++){ const p=getLightPolygons(m, getShape(m)); if(!p) continue;
    if (ptInPoly(q,p.rightPoly)||ptInPoly(q,p.leftPoly)||(p.cornerTri&&ptInPoly(q,p.cornerTri))) return m; }
  return Infinity;
}
const ARC_SAMPLES = (function(){ const N=240, S=[];   // onset 한 번만 계산해 재사용
  for (let i=0;i<=N;i++){ const th=ARC_th90+(ARC_thB-ARC_th90)*i/N; S.push([th, arcOnset(th)]); } return S; })();
function arcPointForHour(target){ let best=null;
  ARC_SAMPLES.forEach(([th,on])=>{ if(!isFinite(on))return; const d=Math.abs(on-target);
    if(best===null||d<best.d) best={d,th}; });
  return arcPt(best ? best.th : ARC_thB);
}
// 각 정각의 원호 위 점 (M1=1시 … M11=11시, M12=11:59 경계)
const MAN_ARC = {};
MAN_ORDER.forEach(name => { const k=parseInt(name.slice(1)); MAN_ARC[name] = arcPointForHour(k<12 ? k*60 : 719); });
// x 증가 순(=M1..M12). 각 마네킹의 객체 top-left 를 자기 정각 onset 점에 둔다 →
//   정각 전엔 전체가 빛 경계 오른쪽(그림자)에 있다가, 정각부터 좌상단부터 드러나기 시작.
//   폭은 다음 onset 점까지의 가로 간격(=그 1시간 동안 빛이 지나갈 거리)으로 잡아 겹침 없이 최대.
const ARC_ORDER = MAN_ORDER.slice().sort((a,b)=>MAN_ARC[a][0]-MAN_ARC[b][0]);
const MAN_GAP = 0.94;   // 인접과의 여유(1=닿음)
const MAN_PLACE = {};
ARC_ORDER.forEach((name, i) => {
  const q = MAN_ARC[name];
  const nx = i < ARC_ORDER.length-1 ? MAN_ARC[ARC_ORDER[i+1]][0]
                                    : q[0] + (q[0] - MAN_ARC[ARC_ORDER[i-1]][0]);  // 마지막은 대칭
  const gap = nx - q[0];                                  // 다음 정각까지 가로 간격
  const bb = MAN_BBOX[name], objW = bb[2]-bb[0];
  const s = gap * MAN_GAP / objW;                         // 겹치지 않는 최대 크기
  MAN_PLACE[name] = { x: q[0], y: q[1], scale: s };        // 객체 top-left = 정각 onset 점
});
// 수동 미세조정 오프셋 (편집 모드 'E' 에서 드래그로 채움 → 여기에 박아 고정)
const MAN_OFFSET = { M1:[-12,-24], M2:[26,-79], M3:[-29,19], M4:[7,-45], M5:[-86,98],
  M6:[-10,-7], M7:[65,-167], M8:[-65,67], M9:[-175,316], M10:[36,-165], M11:[-93,287], M12:[-10,-26] };
function manScale(name){ return MAN_PLACE[name].scale; }
function manAnchor(name){ const o = MAN_OFFSET[name] || [0,0];
  return [MAN_PLACE[name].x + o[0], MAN_PLACE[name].y + o[1]]; }

// 발밑 그림자 — 빛(=문 쪽)의 반대 방향으로, 발에 가까울수록 어두운 그라디언트.
const MAN_LIGHT = [1000, 100];   // 빛/문 기준점 (그림자는 이 반대쪽으로)
function manFeet(name){
  const [ax, ay] = manAnchor(name), bb = MAN_BBOX[name], s = manScale(name), f = MAN_FEET[name];
  return [ax + (f[0]-bb[0])*s, ay + (f[1]-bb[1])*s];   // 실제 발 위치(픽셀 분석)
}
// 그림자 = 마네킹 객체의 검정 실루엣을 세로로 길게 늘이고, 발→끝 그라디언트로
//   페이드해, 발밑에서 문 반대 방향으로 눕혀 그린다.
const SHADOW_STRETCH = 1.6;    // 세로로 길게
const SHADOW_ALPHA   = 0.78;   // 발밑 진하기 (기존 0.6 +30%)
function drawManShadow(name){
  const img = manImgs[name]; if (!img || !img.complete || !img.naturalWidth) return;
  const [fx, fy] = manFeet(name), s = manScale(name), bb = MAN_BBOX[name];
  const ow = (bb[2]-bb[0])*s, oh = (bb[3]-bb[1])*s;
  const len = oh * SHADOW_STRETCH;
  const ang = Math.atan2(fy-MAN_LIGHT[1], fx-MAN_LIGHT[0]);   // 문 반대 방향
  // 검정 실루엣 + 발(아래)→끝(위) 그라디언트 페이드 를 offscreen 에 생성
  const sw = Math.max(1, Math.ceil(ow)), sh = Math.max(1, Math.ceil(len));
  silCanvas.width = sw; silCanvas.height = sh;
  silCtx.clearRect(0,0,sw,sh);
  silCtx.drawImage(img, bb[0],bb[1], bb[2]-bb[0], bb[3]-bb[1], 0,0, sw, sh);  // 객체만 세로 stretch
  silCtx.globalCompositeOperation = 'source-in';
  silCtx.fillStyle = '#000'; silCtx.fillRect(0,0,sw,sh);                       // 색 제거(검정)
  silCtx.globalCompositeOperation = 'destination-in';
  const gg = silCtx.createLinearGradient(0, sh, 0, 0);
  gg.addColorStop(0, `rgba(0,0,0,${SHADOW_ALPHA})`);   // 발밑 = 진함
  gg.addColorStop(1, 'rgba(0,0,0,0)');                 // 끝 = 옅음
  silCtx.fillStyle = gg; silCtx.fillRect(0,0,sw,sh);
  silCtx.globalCompositeOperation = 'source-over';
  // 발을 pivot 으로 그림자 방향으로 눕혀 배치 (실루엣의 발-x 를 pivot 에 맞춤)
  const feetSilX = (MAN_FEET[name][0]-bb[0]) * (sw / (bb[2]-bb[0]));
  manCtx.save();
  manCtx.translate(fx, fy);
  manCtx.rotate(ang + Math.PI/2);     // 실루엣 위(-y)축 → ang 방향
  manCtx.drawImage(silCanvas, -feetSilX, -sh, sw, sh);
  manCtx.restore();
}

function drawMannequins(polys) {
  manCtx.clearRect(0,0,W,H);
  if (!polys) return;                       // 빛 없으면 마네킹도 보이지 않음
  // 1) 발밑 그림자 먼저 (마네킹 아래에 깔리도록)
  MAN_ORDER.forEach(name => {
    const img = manImgs[name];
    if (!img || !img.complete || !img.naturalWidth) return;
    drawManShadow(name);
  });
  // 2) 마네킹
  MAN_ORDER.forEach(name => {
    const img = manImgs[name];
    if (!img || !img.complete || !img.naturalWidth) return;
    const [ax, ay] = manAnchor(name);
    const bb = MAN_BBOX[name], s = manScale(name);
    const dx = ax - bb[0]*s;                 // 객체 top-left 를 anchor 에 맞춤
    const dy = ay - bb[1]*s;
    manCtx.save();
    manCtx.filter = `saturate(${MAN_SAT})`;
    manCtx.drawImage(img, dx, dy, IMG_W*s, IMG_H*s);
    manCtx.restore();
  });
}

function loadMannequins(redraw) {
  let n = MAN_ORDER.length;
  MAN_ORDER.forEach(name => {
    const im = new Image();
    im.onload = im.onerror = () => { if (--n <= 0) redraw(); };
    im.src = encodeURI(MAN_IMGDIR + name + '.png');
    manImgs[name] = im;
  });
}

// ── 메인 ──────────────────────────────────────────────────────
function clockMinutes() {
  const now = new Date();
  return (now.getHours() % 12) * 60
    + now.getMinutes()
    + now.getSeconds() / 60
    + now.getMilliseconds() / 60000;
}
let curMin = clockMinutes();   // 현재 12시간 주기 위치(0..719.999)
function draw(min) {
  curMin = Math.max(0, Math.min(719.999, min));
  const shape = getShape(curMin);
  const polys = getLightPolygons(curMin, shape);

  drawFloor(polys);
  drawGlow(polys);
  drawStruct(shape);
  drawMannequins(polys);
  drawSeconds(curMin);
}

let editOn = false;
draw(curMin);
// 이미지 로드(배경 + 마네킹) 후 현재 시각으로 다시 그린다.
const redraw = () => draw(editOn ? curMin : clockMinutes());
loadBackgrounds(redraw);
loadMannequins(redraw);

// ── 편집 모드 — 마네킹을 드래그해 위치 미세조정 ───────────────
//   진입: 주소에 ?edit=1  또는  화면에서 키보드 'E' 누르기.
//   드래그하면 MAN_OFFSET 이 갱신되고, 좌하단 칸에 복붙용 스니펫이 표시된다.
function enableEdit(){
  if (editOn) return; editOn = true;
  draw(719);                       // 전부 보이게 11:59 로
  const wrap = document.getElementById('canvas-wrapper');
  const panel = document.createElement('textarea');
  panel.style.cssText = 'position:fixed;left:8px;bottom:8px;width:520px;height:90px;z-index:99;'+
    'font:11px monospace;background:#111;color:#0f0;border:1px solid #333;';
  document.body.appendChild(panel);
  const info = document.createElement('div');
  info.style.cssText = 'position:fixed;left:8px;top:8px;z-index:99;color:#0f0;font:13px monospace;'+
    'background:rgba(0,0,0,.7);padding:6px;';
  info.textContent = '편집 모드: 마네킹을 드래그해 이동 → 아래 칸의 MAN_OFFSET 스니펫을 복사해 전달하세요.';
  document.body.appendChild(info);
  function toCanvas(e){ const r = wrap.getBoundingClientRect(); const sc = r.width / W;
    return [(e.clientX - r.left)/sc, (e.clientY - r.top)/sc]; }
  function hit(p){ for (let i=MAN_ORDER.length-1;i>=0;i--){ const name=MAN_ORDER[i];
      const [ax,ay]=manAnchor(name), bb=MAN_BBOX[name], s=manScale(name);
      const w=(bb[2]-bb[0])*s, h=(bb[3]-bb[1])*s;
      if (p[0]>=ax && p[0]<=ax+w && p[1]>=ay && p[1]<=ay+h) return name; } return null; }
  function dump(){ const parts = MAN_ORDER.filter(n=>MAN_OFFSET[n])
      .map(n=>`${n}:[${Math.round(MAN_OFFSET[n][0])},${Math.round(MAN_OFFSET[n][1])}]`);
    panel.value = 'const MAN_OFFSET = { ' + parts.join(', ') + ' };'; }
  let drag = null;
  wrap.addEventListener('mousedown', e => { const p=toCanvas(e), name=hit(p);
    if (name){ drag = { name, sp:p, o0:(MAN_OFFSET[name]||[0,0]).slice() }; e.preventDefault(); } });
  window.addEventListener('mousemove', e => { if(!drag) return; const p=toCanvas(e);
    MAN_OFFSET[drag.name] = [drag.o0[0]+(p[0]-drag.sp[0]), drag.o0[1]+(p[1]-drag.sp[1])];
    draw(719); dump(); });
  window.addEventListener('mouseup', () => { drag=null; });
  dump();
}
// 진입 트리거: URL ?edit=1, 또는 키 'E'
if (new URLSearchParams(location.search).get('edit')) enableEdit();
window.addEventListener('keydown', e => { if (e.key === 'e' || e.key === 'E') enableEdit(); });

// 실제 12시간 흐름에 맞춰 전체 화면을 갱신한다. 편집 모드에서는 11:59 상태를 고정한다.
(function tick(){
  if (editOn) drawSeconds(curMin);
  else draw(clockMinutes());
  requestAnimationFrame(tick);
})();
</script>


</body></html>
